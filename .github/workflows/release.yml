name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    env:
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify .NET SDK
        run: dotnet --version

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          # Extract major.minor for matching game dependency releases (e.g. 0.102.0 -> 0.102)
          GAME_VERSION=$(echo "$TAG" | cut -d. -f1,2)
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG, Game version prefix: $GAME_VERSION"

      - name: Download game dependencies from STS2-Reverse-Engineering
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          GAME_VERSION="${{ steps.version.outputs.game_version }}"
          echo "Looking for STS2-Reverse-Engineering releases matching v${GAME_VERSION}.*"

          # List all releases, find the latest matching v{major}.{minor}.* tag
          MATCHED_TAG=$(gh release list \
            --repo longkerdandy/STS2-Reverse-Engineering \
            --limit 100 \
            --json tagName \
            --jq "[.[] | select(.tagName | test(\"^v${GAME_VERSION}\\\\.\")) | .tagName] | sort_by(. | ltrimstr(\"v\") | split(\".\") | map(tonumber)) | last")

          if [ -z "$MATCHED_TAG" ] || [ "$MATCHED_TAG" = "null" ]; then
            echo "::error::No STS2-Reverse-Engineering release found matching v${GAME_VERSION}.*"
            exit 1
          fi

          echo "Matched release: $MATCHED_TAG"
          mkdir -p game-deps

          # Download all release assets
          gh release download "$MATCHED_TAG" \
            --repo longkerdandy/STS2-Reverse-Engineering \
            --dir game-deps

          echo "Downloaded dependencies:"
          ls -la game-deps/

      - name: Build Mod
        run: |
          dotnet build STS2.Cli.Mod/STS2.Cli.Mod.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:GameAssemblyDir=${{ github.workspace }}/game-deps

      - name: Publish CLI (win-x64)
        run: |
          dotnet publish STS2.Cli.Cmd/STS2.Cli.Cmd.csproj \
            -c Release \
            -r win-x64 \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:DeployOnPublish=false

      - name: Package artifacts
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Package CLI
          CLI_DIR="STS2.Cli.Cmd/bin/Release/net9.0/win-x64/publish"
          CLI_ZIP="sts2-cli-v${VERSION}-win-x64.zip"
          (cd "$CLI_DIR" && zip "${{ github.workspace }}/${CLI_ZIP}" sts2.exe)
          echo "cli_zip=$CLI_ZIP" >> "$GITHUB_OUTPUT"

          # Package Mod (DLL + manifest JSON)
          MOD_DIR="STS2.Cli.Mod/bin/Release/net9.0"
          MOD_ZIP="sts2-mod-v${VERSION}.zip"
          (cd "$MOD_DIR" && zip "${{ github.workspace }}/${MOD_ZIP}" STS2.Cli.Mod.dll STS2.Cli.Mod.json)
          echo "mod_zip=$MOD_ZIP" >> "$GITHUB_OUTPUT"

          echo "Packaged artifacts:"
          ls -la "${{ github.workspace }}"/${CLI_ZIP} "${{ github.workspace }}"/${MOD_ZIP}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "${{ steps.package.outputs.cli_zip }}" \
            "${{ steps.package.outputs.mod_zip }}"
