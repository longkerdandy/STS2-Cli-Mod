name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    env:
      DOTNET_NOLOGO: true

    strategy:
      matrix:
        include:
          - rid: win-x64
            exe: sts2.exe
            archive: zip
          - rid: osx-x64
            exe: sts2
            archive: tar.gz
          - rid: osx-arm64
            exe: sts2
            archive: tar.gz
          - rid: linux-x64
            exe: sts2
            archive: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify .NET SDK
        run: dotnet --version

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          # Extract major.minor for matching game dependency releases (e.g. 0.102.0 -> 0.102)
          GAME_VERSION=$(echo "$TAG" | cut -d. -f1,2)
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG, Game version prefix: $GAME_VERSION"

      - name: Download game dependencies from STS2-Reverse-Engineering
        if: matrix.rid == 'win-x64'
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        run: |
          GAME_VERSION="${{ steps.version.outputs.game_version }}"
          echo "Looking for STS2-Reverse-Engineering releases matching v${GAME_VERSION}.*"

          # List all releases, find the latest matching v{major}.{minor}.* tag
          MATCHED_TAG=$(gh release list \
            --repo longkerdandy/STS2-Reverse-Engineering \
            --limit 100 \
            --json tagName \
            --jq "[.[] | select(.tagName | test(\"^v${GAME_VERSION}\\\\.\")) | .tagName] | sort_by(. | ltrimstr(\"v\") | split(\".\") | map(tonumber)) | last")

          if [ -z "$MATCHED_TAG" ] || [ "$MATCHED_TAG" = "null" ]; then
            echo "::error::No STS2-Reverse-Engineering release found matching v${GAME_VERSION}.*"
            exit 1
          fi

          echo "Matched release: $MATCHED_TAG"
          mkdir -p game-deps

          # Download all release assets
          gh release download "$MATCHED_TAG" \
            --repo longkerdandy/STS2-Reverse-Engineering \
            --dir game-deps

          echo "Downloaded dependencies:"
          ls -la game-deps/

      - name: Build Mod
        if: matrix.rid == 'win-x64'
        run: |
          dotnet build STS2.Cli.Mod/STS2.Cli.Mod.csproj \
            -c Release \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:GameAssemblyDir=${{ github.workspace }}/game-deps

      - name: Publish CLI (${{ matrix.rid }})
        run: |
          dotnet publish STS2.Cli.Cmd/STS2.Cli.Cmd.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:DeployOnPublish=false

      - name: Package CLI
        id: cli
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RID="${{ matrix.rid }}"
          CLI_DIR="STS2.Cli.Cmd/bin/Release/net9.0/${RID}/publish"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            CLI_ARCHIVE="sts2-cli-v${VERSION}-${RID}.zip"
            (cd "$CLI_DIR" && zip "${{ github.workspace }}/${CLI_ARCHIVE}" ${{ matrix.exe }})
          else
            CLI_ARCHIVE="sts2-cli-v${VERSION}-${RID}.tar.gz"
            (cd "$CLI_DIR" && tar czf "${{ github.workspace }}/${CLI_ARCHIVE}" ${{ matrix.exe }})
          fi

          echo "cli_archive=$CLI_ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "Packaged: $CLI_ARCHIVE"

      - name: Package Mod
        if: matrix.rid == 'win-x64'
        id: mod
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MOD_DIR="STS2.Cli.Mod/bin/Release/net9.0"
          MOD_ZIP="sts2-mod-v${VERSION}.zip"
          (cd "$MOD_DIR" && zip "${{ github.workspace }}/${MOD_ZIP}" STS2.Cli.Mod.dll STS2.Cli.Mod.json)
          echo "mod_zip=$MOD_ZIP" >> "$GITHUB_OUTPUT"
          echo "Packaged: $MOD_ZIP"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.rid }}
          path: ${{ steps.cli.outputs.cli_archive }}

      - name: Upload Mod artifact
        if: matrix.rid == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: mod
          path: ${{ steps.mod.outputs.mod_zip }}

  publish:
    runs-on: ubuntu-24.04
    needs: release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes \
            artifacts/*
